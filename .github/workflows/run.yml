name: Find Bot

on:
  schedule:
    - cron: "0 2 * * 1-5"   # preload sáng
    - cron: "0 3 * * 1-5"   # run bot
  workflow_dispatch:

jobs:

  preload:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: pip install vnstock pandas

      - name: Preload data
        run: python src/preload_data.py

      - name: Commit data
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add data/market/
          git commit -m "update data" || echo "no change"
          git push

  run:
    runs-on: ubuntu-latest
    needs: preload

    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: pip install vnstock pandas requests

      # 🔥 tạo folder log
      - name: Create log folder
        run: mkdir -p logs

      # 🚀 RUN BOT + TELEGRAM + LOG
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/main.py 2>&1 | tee logs/run.log

      # 💾 lưu log để debug
      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: bot-log
          path: logs/run.log
