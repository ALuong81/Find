name: Find Bot

on:
  schedule:
    # 🇻🇳 08:30 → preload
    - cron: "30 1 * * 1-5"

    # 🇻🇳 09:30 → run bot (đầu phiên)
    - cron: "30 2 * * 1-5"

    # 🇻🇳 11:00 → run bot (giữa phiên)
    - cron: "0 4 * * 1-5"

    # 🇻🇳 14:30 → run bot (cuối phiên)
    - cron: "30 7 * * 1-5"

    # 🇻🇳 16:00 → backtest
    - cron: "0 9 * * 1-5"

  workflow_dispatch:


jobs:

  # =========================
  # PRELOAD DATA
  # =========================
  preload:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 1 * * 1-5'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: pip install vnstock pandas

      - name: Preload data
        run: python src/preload_data.py

      - name: Commit data
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add data/market/ || echo "no data"
          git commit -m "update data" || echo "no change"
          git push


  # =========================
  # RUN BOT
  # =========================
  run:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 2 * * 1-5' ||
      github.event.schedule == '0 4 * * 1-5' ||
      github.event.schedule == '30 7 * * 1-5'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: pip install vnstock pandas requests

      - name: Create log folder
        run: mkdir -p logs

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/main.py 2>&1 | tee logs/run.log

      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: bot-log
          path: logs/run.log


  # =========================
  # BACKTEST
  # =========================
  backtest:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 9 * * 1-5'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: pip install vnstock pandas numpy

      - name: Create log folder
        run: mkdir -p logs

      - name: Run backtest
        run: |
          python src/run_backtest.py 2>&1 | tee logs/backtest.log

      - name: Upload backtest log
        uses: actions/upload-artifact@v4
        with:
          name: backtest-log
          path: logs/backtest.log

      - name: Commit backtest result
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add backtest_result.csv || echo "no file"
          git commit -m "update backtest" || echo "no change"
          git push
