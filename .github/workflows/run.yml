name: Find Bot

on:
  schedule:
    # 🇻🇳 08:30 → preload
    - cron: "30 1 * * 1-5"

    # 🇻🇳 09:30 → run bot
    - cron: "30 2 * * 1-5"

    # 🇻🇳 11:00
    - cron: "0 4 * * 1-5"

    # 🇻🇳 14:30
    - cron: "30 7 * * 1-5"

    # 🇻🇳 16:00 → backtest
    - cron: "0 9 * * 1-5"

  workflow_dispatch:


jobs:

  # =========================
  # PRELOAD DATA → PUSH DATA BRANCH
  # =========================
  preload:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 1 * * 1-5'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: pip install vnstock pandas

      - name: Preload data
        run: python src/preload_data.py

      # 🔥 PUSH DATA
      - name: Commit to data branch
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"

          git fetch origin

          # 🔥 check branch tồn tại chưa
          if git ls-remote --exit-code --heads origin data; then
            git checkout data
            git pull origin data
          else
            git checkout -b data
          fi

          git add data/market/ data/liquidity.csv || true
          git commit -m "update market data" || echo "no change"

          git push -u origin data || git push origin data


  # =========================
  # RUN BOT → READ DATA BRANCH
  # =========================
  run:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 2 * * 1-5' ||
      github.event.schedule == '0 4 * * 1-5' ||
      github.event.schedule == '30 7 * * 1-5'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # code
      - uses: actions/checkout@v3

      # 🔥 checkout data branch (không crash nếu chưa có)
      - name: Checkout data branch
        continue-on-error: true
        uses: actions/checkout@v3
        with:
          ref: data
          path: data-branch

      - name: Install
        run: pip install vnstock pandas requests

      - name: Create log folder
        run: mkdir -p logs

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/main.py 2>&1 | tee logs/run.log

      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: bot-log
          path: logs/run.log


  # =========================
  # BACKTEST → PUSH DATA BRANCH
  # =========================
  backtest:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 9 * * 1-5'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: pip install vnstock pandas numpy

      - name: Create log folder
        run: mkdir -p logs

      - name: Run backtest
        run: |
          python src/run_backtest.py 2>&1 | tee logs/backtest.log

      - name: Upload backtest log
        uses: actions/upload-artifact@v4
        with:
          name: backtest-log
          path: logs/backtest.log

      # 🔥 PUSH BACKTEST RESULT
      - name: Commit backtest to data branch
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"

          git fetch origin

          if git ls-remote --exit-code --heads origin data; then
            git checkout data
            git pull origin data
          else
            git checkout -b data
          fi

          git add backtest_result.csv || true
          git commit -m "update backtest result" || echo "no change"

          git push -u origin data || git push origin data
