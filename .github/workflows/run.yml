name: Find Bot

on:
  schedule:
    - cron: "30 1 * * 1-5"
    - cron: "30 2 * * 1-5"
    - cron: "0 4 * * 1-5"
    - cron: "30 7 * * 1-5"
    - cron: "0 9 * * 1-5"

  workflow_dispatch:

concurrency:
  group: find-bot-${{ github.ref }}
  cancel-in-progress: false


jobs:

# =========================
# PRELOAD
# =========================
  preload:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 1 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: pip install vnstock pandas

      # 🔥 CACHE THEO NGÀY
      - name: Restore market cache
        uses: actions/cache@v3
        with:
          path: data/market
          key: market-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-${{ runner.os }}-

      - name: Preload data
        run: python src/preload_data.py

      - name: Save market cache
        uses: actions/cache@v3
        with:
          path: data/market
          key: market-${{ runner.os }}-${{ github.run_id }}

      # =========================
      # 🔥 WORKTREE PUSH FIXED
      # =========================
      - name: Push data via worktree
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"

          git fetch origin

          rm -rf data-wt || true

          # tạo worktree
          if git ls-remote --exit-code --heads origin data; then
            git worktree add data-wt origin/data
          else
            git worktree add -b data data-wt
          fi

          cd data-wt

          # 🔥 FIX DETACHED HEAD
          git checkout -B data || git checkout data

          mkdir -p data/market
          rsync -av --delete ../data/market/ data/market/ || true
          cp ../data/liquidity.csv data/ || true

          git add .

          git commit -m "update market data $(date)" || echo "no change"

          git pull --rebase origin data || true
          git push origin data


# =========================
# RUN BOT
# =========================
  run:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 2 * * 1-5' ||
      github.event.schedule == '0 4 * * 1-5' ||
      github.event.schedule == '30 7 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Restore market cache
        uses: actions/cache@v3
        with:
          path: data/market
          key: market-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-${{ runner.os }}-

      # 🔥 fallback nếu cache miss
      - name: Fallback load data branch
        run: |
          if [ ! -d "data/market" ] || [ -z "$(ls -A data/market)" ]; then
            echo "⚠️ CACHE MISS → LOAD FROM DATA BRANCH"
            git clone --depth=1 --branch data https://github.com/${{ github.repository }} data-tmp || true
            cp -r data-tmp/data/market data/ || true
          fi

      - name: Install
        run: pip install vnstock pandas requests

      - name: Create log folder
        run: mkdir -p logs

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/main.py 2>&1 | tee logs/run.log

      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: bot-log
          path: logs/run.log


# =========================
# BACKTEST
# =========================
  backtest:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 9 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Restore market cache
        uses: actions/cache@v3
        with:
          path: data/market
          key: market-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-${{ runner.os }}-

      - name: Install
        run: pip install vnstock pandas numpy

      - name: Create log folder
        run: mkdir -p logs

      - name: Run backtest
        run: python src/run_backtest.py 2>&1 | tee logs/backtest.log

      - name: Upload backtest log
        uses: actions/upload-artifact@v4
        with:
          name: backtest-log
          path: logs/backtest.log

      # =========================
      # 🔥 WORKTREE PUSH FIXED
      # =========================
      - name: Push backtest result
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"

          git fetch origin

          rm -rf data-wt || true

          if git ls-remote --exit-code --heads origin data; then
            git worktree add data-wt origin/data
          else
            git worktree add -b data data-wt
          fi

          cd data-wt

          # 🔥 FIX DETACHED HEAD
          git checkout -B data || git checkout data

          cp ../backtest_result.csv . || true

          git add .
          git commit -m "update backtest $(date)" || echo "no change"

          git pull --rebase origin data || true
          git push origin data
